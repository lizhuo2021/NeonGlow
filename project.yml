name: NeonGlow
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    DEVELOPMENT_TEAM: EGZJ63ZF77
    CODE_SIGN_STYLE: Automatic
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    GENERATE_INFOPLIST_FILE: YES
targets:
  NeonGlowKit:
    type: framework
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NeonGlowKit/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lizhuozhuo.NeonGlowKit
        PRODUCT_NAME: NeonGlowKit
        DEFINES_MODULE: YES
        SKIP_INSTALL: NO
        INFOPLIST_KEY_CFBundleDisplayName: NeonGlowKit
        INFOPLIST_KEY_CFBundleShortVersionString: 1.0.0
        INFOPLIST_KEY_CFBundleVersion: 1
    dependencies:
      - sdk: MetalKit.framework
      - sdk: Metal.framework
      - sdk: QuartzCore.framework
  NeonGlow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NeonGlowShowcase
    dependencies:
      - target: NeonGlowKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lizhuozhuo.NeonGlow
        PRODUCT_NAME: NeonGlow
        INFOPLIST_KEY_CFBundleDisplayName: NeonGlow
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.graphics-design
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  NeonGlowObjC:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: NeonGlowObjCModule
      - path: NeonGlowObjCShowcase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lizhuozhuo.NeonGlowObjC
        PRODUCT_NAME: NeonGlowObjC
        INFOPLIST_KEY_CFBundleDisplayName: NeonGlowObjC
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.graphics-design
        CLANG_ENABLE_OBJC_ARC: YES
    dependencies:
      - sdk: MetalKit.framework
      - sdk: Metal.framework
      - sdk: QuartzCore.framework
schemes:
  NeonGlow:
    build:
      targets:
        NeonGlowKit: all
        NeonGlow: all
    run:
      config: Debug
    archive:
      config: Release
  NeonGlowObjC:
    build:
      targets:
        NeonGlowObjC: all
    run:
      config: Debug
    archive:
      config: Release
